Product:
  _id: ObjectId

  name:
    type: String
    required: true
    trim: true

  slug:
    type: String
    unique: true

  description:
    short:
      type: String
    long:
      type: String

  images:
    type: Array
    items:
      type: String
    description: Array of image URLs

  thumbnail:
    type: String

  price:
    original:
      type: Number
      required: true
    discountPercentage:
      type: Number
      default: 0
    final:
      type: Number
      description: Price after discount

  category:
    type: String

  brand:
    type: String

  tags:
    type: Array
    items:
      type: String

  stock:
    type: Number
    default: 0

  isAvailable:
    type: Boolean
    default: true

  design:
    bgColor:
      type: String
    panelColor:
      type: String
    textColor:
      type: String

  ratings:
    type: Number
    default: 0

  reviewsCount:
    type: Number
    default: 0

  createdAt:
    type: Date
    default: Date.now

  updatedAt:
    type: Date
    default: Date.now
